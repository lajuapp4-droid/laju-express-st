<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Laju Express - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* Sembunyikan div saat di-print */
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold italic">LAJU EXPRESS</h1>
        <div id="navRight">
            <button id="btnLogin" onclick="showPage('loginPage')" class="bg-white text-blue-800 px-3 py-1 rounded font-bold">Login Karyawan</button>
            <button id="btnLogout" onclick="logout()" class="hidden bg-red-500 px-3 py-1 rounded font-bold">Logout</button>
        </div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyA1EJpnyq-5cruPekt8wVfSqdnfFVoswH4tiCyxPszeYDWFfB56xFfOnzZT1JRM2AK4Q/exec";
        let userSesi = null;
        let fotoBase64Global = null;
        let hitunganOngkir = 0;
    </script>

    <div id="trackingPage" class="container mx-auto mt-10 p-4 max-w-md">
        <div class="bg-white p-6 rounded-lg shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-4">Lacak Paket</h2>
            <input type="text" id="resiTrack" placeholder="Masukkan Resi (LAJU-...)" class="w-full border-2 p-3 rounded mb-4 text-center font-bold uppercase">
            <button onclick="cekResi()" class="w-full bg-orange-500 text-white font-bold py-3 rounded">CEK RESI</button>
            <div id="resultTrack" class="mt-6 hidden text-left bg-gray-50 p-4 rounded border">
                <p class="text-sm text-gray-500">Rute & Penerima:</p>
                <p id="t_rute" class="font-bold">-</p>
                <p id="t_penerima" class="font-bold mb-2">-</p>
                <span id="t_badge" class="px-3 py-1 text-white font-bold rounded">STATUS</span>
                <p class="text-sm mt-3">📦 Posisi: <span id="t_posisi" class="font-bold"></span></p>
            </div>
        </div>
    </div>

    <div id="loginPage" class="container mx-auto mt-10 p-4 max-w-md hidden">
        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-2xl font-bold mb-4 text-center">Portal Karyawan</h2>
            <input type="text" id="l_user" placeholder="Username" class="w-full border p-2 mb-3 rounded">
            <input type="password" id="l_pass" placeholder="Password" class="w-full border p-2 mb-4 rounded">
            <button id="btnProsesLogin" onclick="login()" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Masuk</button>
        </div>
    </div>

    <div id="dashboardPage" class="container mx-auto mt-4 p-4 hidden">
        <div class="bg-white p-4 rounded shadow mb-4 border-l-4 border-blue-500">
            <h2 class="text-xl font-bold" id="dashName">Nama User</h2>
            <p class="text-sm text-gray-600" id="dashInfo">Role | Cabang</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button id="menuInput" onclick="showMenu('formInput')" class="hidden bg-white p-6 rounded shadow border-t-4 border-green-500 text-left">
                <h3 class="font-bold text-lg">📝 Input Resi (Multi-Step)</h3>
                <p class="text-sm text-gray-500">Buat resi dengan Smart Pricing & Bukti Foto</p>
            </button>
            
            <button id="menuTransit" onclick="showMenu('formTransit')" class="hidden bg-white p-6 rounded shadow border-t-4 border-orange-500 text-left">
                <h3 class="font-bold text-lg">📸 Transit & POD</h3>
                <p class="text-sm text-gray-500">Scan Barcode untuk update posisi paket</p>
            </button>
        </div>
    </div>

    <div id="formInput" class="container mx-auto mt-4 p-4 hidden max-w-2xl">
        <button onclick="showMenu('none')" class="text-blue-500 mb-4 underline">< Kembali ke Dashboard</button>
        
        <div id="step1" class="bg-white p-6 rounded shadow">
            <h3 class="font-bold text-lg border-b pb-2 mb-4">Step 1: Data & Volume Barang</h3>
            <input type="text" id="i_pengirim" placeholder="Nama Pengirim" class="w-full border p-2 mb-2">
            <input type="text" id="i_penerima" placeholder="Nama Penerima" class="w-full border p-2 mb-2">
            <select id="i_zona" class="w-full border p-2 mb-2">
                <option value="8000">Satu Kota (Rp 8k)</option>
                <option value="12000">Satu Provinsi (Rp 12k)</option>
                <option value="20000">Sesama Jawa (Rp 20k)</option>
                <option value="45000">Lintas Pulau (Rp 45k)</option>
            </select>
            <input type="number" id="i_berat" placeholder="Berat (Kg)" class="w-full border p-2 mb-2">
            
            <div class="flex gap-2 mb-2">
                <input type="number" id="i_p" placeholder="P(cm)" class="w-1/3 border p-2">
                <input type="number" id="i_l" placeholder="L(cm)" class="w-1/3 border p-2">
                <input type="number" id="i_t" placeholder="T(cm)" class="w-1/3 border p-2">
            </div>

            <select id="i_kategori" onchange="cekAsuransi()" class="w-full border p-2 mb-2">
                <option value="Umum">Barang Umum</option>
                <option value="Pecah Belah">Pecah Belah (+Rp 5k)</option>
                <option value="Elektronik">Elektronik (+Rp 10k & Wajib Asuransi)</option>
                <option value="Makanan">Makanan (+Rp 3k)</option>
            </select>

            <label class="block text-sm font-bold mt-4">📸 Foto Barang (Maks 1MB):</label>
            <input type="file" accept="image/*" capture="environment" id="i_foto" onchange="kompresFoto(event)" class="w-full border p-2 mb-4">
            
            <button onclick="lanjutStep2()" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Lanjut Pembayaran ></button>
        </div>

        <div id="step2" class="bg-white p-6 rounded shadow hidden">
            <h3 class="font-bold text-lg border-b pb-2 mb-4">Step 2: Layanan & Pembayaran</h3>
            <select id="i_layanan" class="w-full border p-2 mb-2">
                <option value="1">Reguler (1x)</option>
                <option value="1.5">Sameday (1.5x)</option>
                <option value="2">Instant (2x)</option>
                <option value="0.65">Cargo (0.65x - Min 10kg)</option>
            </select>
            
            <div class="mb-4">
                <label class="flex items-center"><input type="checkbox" id="chk_asuransi" onchange="toggleHargaBarang()" class="mr-2"> 🛡️ Tambah Asuransi (0.5%)</label>
                <input type="number" id="i_hargaBarang" placeholder="Nilai Harga Barang (Rp)" class="w-full border p-2 mt-2 hidden">
            </div>

            <select id="i_bayar" onchange="togglePrepaid()" class="w-full border p-2 mb-4 font-bold bg-gray-50">
                <option value="PREPAID">Prepaid (Cash/Transfer)</option>
                <option value="COD">COD (Bayar di Tujuan +Rp 5k)</option>
            </select>

            <button onclick="hitungTotal()" class="w-full bg-green-500 text-white font-bold py-2 mb-2 rounded">Hitung Estimasi</button>
            <div id="rincianBiaya" class="bg-yellow-100 p-3 rounded mb-4 text-sm hidden"></div>

            <label id="lbl_prepaid" class="flex items-center text-red-600 font-bold mb-4"><input type="checkbox" id="chk_lunas" class="mr-2"> ✅ Saya sudah terima uang dari pengirim.</label>
            
            <button id="btnProsesResi" onclick="prosesResi()" class="w-full bg-blue-800 text-white font-bold py-3 rounded">PROSES RESI & CETAK</button>
        </div>
    </div>

    <div id="printArea" class="hidden bg-white p-8 w-full max-w-md mx-auto border-2 border-black">
        <h1 class="text-3xl font-black italic text-center border-b-4 border-black pb-2 mb-4">LAJU EXPRESS</h1>
        <div class="flex justify-center mb-4"><svg id="barcode"></svg></div>
        <p class="font-bold text-xl mb-2">PENGIRIM: <span id="p_pengirim"></span></p>
        <p class="font-bold text-xl mb-4">PENERIMA: <span id="p_penerima"></span></p>
        <div class="border-t-2 border-black pt-2 flex justify-between font-bold">
            <p>Layanan: <span id="p_layanan"></span></p>
            <p>Berat: <span id="p_berat"></span> Kg</p>
        </div>
        <h2 id="p_tagih" class="text-center text-2xl font-black mt-6 border-4 border-black py-2"></h2>
        <button onclick="window.print()" class="mt-8 w-full bg-blue-500 text-white py-2 rounded no-print">🖨️ KLIK UNTUK PRINT</button>
        <button onclick="location.reload()" class="mt-2 w-full text-blue-500 underline no-print">Tutup</button>
    </div>

    <script>
        function showPage(page) {
            ['trackingPage', 'loginPage', 'dashboardPage', 'formInput'].forEach(p => document.getElementById(p).classList.add('hidden'));
            if(page !== 'none') document.getElementById(page).classList.remove('hidden');
            document.getElementById('btnLogin').classList.toggle('hidden', page === 'dashboardPage' || userSesi !== null);
            document.getElementById('btnLogout').classList.toggle('hidden', userSesi === null);
        }

        function showMenu(menu) {
            ['formInput'].forEach(p => document.getElementById(p).classList.add('hidden'));
            if(menu !== 'none') document.getElementById(menu).classList.remove('hidden');
            if(menu === 'none') showPage('dashboardPage');
        }

        // --- AUTH & RBAC ---
        async function login() {
            let u = document.getElementById('l_user').value;
            let p = document.getElementById('l_pass').value;
            document.getElementById('btnProsesLogin').innerText = "Loading...";
            
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: u, password: p }) });
                let data = await res.json();
                if(data.success) {
                    userSesi = data.data;
                    document.getElementById('dashName').innerText = `Halo, ${userSesi.nama}!`;
                    document.getElementById('dashInfo').innerText = `${userSesi.role} | ${userSesi.cabang}`;
                    
                    // RBAC Dinamis
                    let role = userSesi.role.toUpperCase();
                    if(role === 'ADMIN') {
                        document.getElementById('menuInput').classList.remove('hidden');
                        document.getElementById('menuTransit').classList.remove('hidden');
                        showPage('dashboardPage');
                    } else if (role === 'KURIR') {
                        document.getElementById('menuTransit').classList.remove('hidden');
                        showPage('dashboardPage');
                    } else {
                        alert("Customer diarahkan ke Tracking.");
                        showPage('trackingPage');
                    }
                } else alert(data.message);
            } catch(e) { alert("Gagal konek server."); }
            document.getElementById('btnProsesLogin').innerText = "Masuk";
        }

        async function logout() {
            if(userSesi) {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logout', nama: userSesi.nama }) });
                userSesi = null;
                showPage('trackingPage');
            }
        }

        // --- SMART PRICING & LOGIKA FORM ---
        function cekAsuransi() {
            let kat = document.getElementById('i_kategori').value;
            let chk = document.getElementById('chk_asuransi');
            if(kat === 'Elektronik') { chk.checked = true; chk.disabled = true; toggleHargaBarang(); }
            else { chk.disabled = false; }
        }

        function toggleHargaBarang() {
            let input = document.getElementById('i_hargaBarang');
            if(document.getElementById('chk_asuransi').checked) input.classList.remove('hidden');
            else { input.classList.add('hidden'); input.value = ''; }
        }

        function togglePrepaid() {
            let bayar = document.getElementById('i_bayar').value;
            document.getElementById('lbl_prepaid').classList.toggle('hidden', bayar === 'COD');
        }

        function kompresFoto(event) {
            let file = event.target.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let maxW = 800; let scale = 1;
                    if(img.width > maxW) scale = maxW / img.width;
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    fotoBase64Global = canvas.toDataURL('image/jpeg', 0.6); // Kompres 60%
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function lanjutStep2() {
            if(!document.getElementById('i_pengirim').value || !fotoBase64Global) return alert("Lengkapi data & pastikan Foto terupload!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function hitungTotal() {
            let base = parseInt(document.getElementById('i_zona').value);
            let berat = parseFloat(document.getElementById('i_berat').value) || 1;
            let layanan = parseFloat(document.getElementById('i_layanan').value);
            let kat = document.getElementById('i_kategori').value;
            
            // Cargo Min 10kg
            if(layanan === 0.65 && berat < 10) { berat = 10; alert("Cargo hitungan minimal 10kg!"); }
            
            let ongkir = base * berat * layanan;
            
            // Volume Oversize
            let p = document.getElementById('i_p').value || 0;
            let l = document.getElementById('i_l').value || 0;
            let t = document.getElementById('i_t').value || 0;
            let vol = p * l * t;
            let biayaVolume = 0;
            if(vol > 40000) biayaVolume = Math.ceil((vol - 40000) / 250) * 1500;

            // Kategori Surcharge
            let biayaKategori = (kat==='Pecah Belah')?5000 : (kat==='Elektronik')?10000 : (kat==='Makanan')?3000 : 0;
            
            // Asuransi & COD
            let asuransi = document.getElementById('chk_asuransi').checked ? (parseFloat(document.getElementById('i_hargaBarang').value||0) * 0.005) : 0;
            let cod = document.getElementById('i_bayar').value === 'COD' ? 5000 : 0;

            hitunganOngkir = ongkir + biayaVolume + biayaKategori + asuransi + cod;
            
            let rincian = document.getElementById('rincianBiaya');
            rincian.innerHTML = `Ongkir Dasar: Rp${ongkir}<br>Biaya Oversize: Rp${biayaVolume}<br>Surcharge Kat: Rp${biayaKategori}<br>Asuransi: Rp${asuransi}<br>COD Fee: Rp${cod}<br><br><b>TOTAL: Rp${hitunganOngkir}</b>`;
            rincian.classList.remove('hidden');
        }

        async function prosesResi() {
            if(document.getElementById('i_bayar').value === 'PREPAID' && !document.getElementById('chk_lunas').checked) {
                return alert("Centang konfirmasi penerimaan uang dulu bosku!");
            }
            
            let btn = document.getElementById('btnProsesResi');
            btn.innerText = "Mengupload Data & Foto... Mohon tunggu!";
            btn.disabled = true;

            let resiBaru = "LAJU-" + new Date().getTime();
            let bayar = document.getElementById('i_bayar').value;

            let payload = {
                action: 'add_paket', resi: resiBaru,
                pengirim: document.getElementById('i_pengirim').value, penerima: document.getElementById('i_penerima').value,
                tujuan: document.getElementById('i_zona').options[document.getElementById('i_zona').selectedIndex].text,
                berat: document.getElementById('i_berat').value, totalOngkir: hitunganOngkir,
                posisi: userSesi.cabang, waktu: new Date().toLocaleString('id-ID'),
                fotoBase64: fotoBase64Global, metodeBayar: bayar, statusBayar: bayar === 'COD' ? 'PENDING COD' : 'LUNAS'
            };

            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                let data = await res.json();
                if(data.success) {
                    // Siapkan Tampilan Cetak
                    document.getElementById('p_pengirim').innerText = payload.pengirim;
                    document.getElementById('p_penerima').innerText = payload.penerima;
                    document.getElementById('p_layanan').innerText = document.getElementById('i_layanan').options[document.getElementById('i_layanan').selectedIndex].text;
                    document.getElementById('p_berat').innerText = payload.berat;
                    
                    let tagih = document.getElementById('p_tagih');
                    if(bayar === 'COD') { tagih.innerText = "WAJIB TAGIH: Rp " + hitunganOngkir; tagih.className = "text-center text-2xl font-black mt-6 border-4 border-black py-2 bg-yellow-300"; }
                    else { tagih.innerText = "LUNAS / NON-COD"; tagih.className = "text-center text-xl font-bold mt-6 py-2"; }
                    
                    JsBarcode("#barcode", resiBaru, {format: "CODE128", width: 2, height: 50});
                    
                    document.getElementById('dashboardPage').classList.add('hidden');
                    document.getElementById('formInput').classList.add('hidden');
                    document.getElementById('printArea').classList.remove('hidden');
                }
            } catch(e) { alert("Gagal proses resi."); btn.disabled = false; btn.innerText = "PROSES RESI & CETAK"; }
        }

        // --- PUBLIC TRACKING ---
        async function cekResi() {
            let resi = document.getElementById('resiTrack').value;
            let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'lacak', resi: resi }) });
            let data = await res.json();
            if(data.success) {
                document.getElementById('t_rute').innerText = data.data.rute;
                document.getElementById('t_penerima').innerText = data.data.penerima;
                document.getElementById('t_posisi').innerText = `${data.data.posisi} (${data.data.waktu})`;
                let badge = document.getElementById('t_badge');
                badge.innerText = data.data.status;
                badge.className = data.data.status === 'DELIVERED' ? 'px-3 py-1 bg-green-500 text-white font-bold rounded' : 'px-3 py-1 bg-yellow-500 text-white font-bold rounded';
                document.getElementById('resultTrack').classList.remove('hidden');
            } else alert(data.message);
        }
    </script>
</body>
</html>
